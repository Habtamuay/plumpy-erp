{% extends 'base.html' %}
{% block title %}Cash Flow{% endblock %}
{% block content %}
<div class="container py-4">
  <h3>Cash Flow</h3>
  <p class="text-muted">Company: {{ company.name }}</p>
  <table class="table table-bordered w-auto">
    <tr class="fw-bold">
      <th>Cash Balance</th>
      <td class="text-end">{{ report.cash_balance|floatformat:2 }}</td>
    </tr>
  </table>
</div>
{% endblock %}
