<!-- reports/production/consumption.html -->
{% extends "reports/base_report.html" %}

{% block title %}Consumption Report{% endblock %}
{% block report_title %}Material Consumption Report{% endblock %}

{% block filters %}
<div class="filter-form">
    <form method="GET">
        <div class="row">
            <div class="col-md-4">
                <label for="material">Material:</label>
                <input type="text" id="material" name="material" class="form-control">
            </div>
            <div class="col-md-4">
                <label for="date_range">Date Range:</label>
                <input type="text" id="date_range" name="date_range" class="form-control" placeholder="YYYY-MM-DD to YYYY-MM-DD">
            </div>
            <div class="col-md-4 mt-4">
                <button type="submit" class="btn btn-primary">Apply</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block report_content %}
<h3>Material Consumption</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Material</th>
            <th>Consumed</th>
            <th>Run ID</th>
        </tr>
    </thead>
    <tbody>
        <!-- Dynamic data rows -->
    </tbody>
</table>
{% endblock %}
