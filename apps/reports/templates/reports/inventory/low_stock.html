<!-- reports/inventory/low_stock.html -->
{% extends "reports/base_report.html" %}

{% block title %}Low Stock{% endblock %}
{% block report_title %}Low Stock Alert{% endblock %}

{% block filters %}
<div class="filter-form">
    <form method="GET">
        <div class="row">
            <div class="col-md-6">
                <label for="threshold">Threshold (%):</label>
                <input type="number" id="threshold" name="threshold" class="form-control" value="20">
            </div>
            <div class="col-md-6 mt-4">
                <button type="submit" class="btn btn-primary">Apply</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% block report_content %}
<h3>Low Stock Items</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Product</th>
            <th>Current Stock</th>
            <th>Reorder Level</th>
        </tr>
    </thead>
    <tbody>
        <!-- Dynamic data rows -->
    </tbody>
</table>
{% endblock %}
