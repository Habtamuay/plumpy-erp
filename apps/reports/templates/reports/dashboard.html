{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>{{ title }}</h1>
    <div class="alert alert-info">
        {{ message }}
    </div>
    
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5>Inventory Reports</h5>
                </div>
                <div class="card-body">
                    <ul class="list-group">
                        <li class="list-group-item">
                            <a href="{% url 'reports:stock_report' %}">Stock Report</a>
                        </li>
                        <li class="list-group-item">
                            <a href="{% url 'reports:consumption_report' %}">Consumption vs BOM Report</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5>Financial Reports</h5>
                </div>
                <div class="card-body">
                    <ul class="list-group">
                        <li class="list-group-item">
                            <a href="{% url 'reports:financial_report' %}">Financial Report</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
